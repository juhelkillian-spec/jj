<script>
// ── CONFIG ──────────────────────────────────────────────────
const API_BASE = '';
const API = API_BASE + '/api';

// ── AUTH STATE ───────────────────────────────────────────────
let authToken = localStorage.getItem('crous_auth_token') || '';
let authRequired = false;

async function checkAuth() {
  try {
    const r = await fetch(API + '/auth-check', { headers: authToken ? {'Authorization': 'Bearer ' + authToken} : {} });
    if (r.ok) return true;
    if (r.status === 401) { authRequired = true; return false; }
    return true;
  } catch { return true; }
}

async function doLogin(e) {
  e.preventDefault();
  const pw = document.getElementById('login-password').value;
  try {
    const r = await fetch(API + '/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({password: pw}) });
    const data = await r.json();
    if (data.ok) {
      authToken = data.token;
      localStorage.setItem('crous_auth_token', authToken);
      document.getElementById('login-overlay').classList.add('hidden');
      if (authRequired) {
        document.getElementById('logout-btn').classList.remove('hidden');
      }
      buildNav();
      navigate('overview');
    } else {
      document.getElementById('login-error').classList.remove('hidden');
    }
  } catch { document.getElementById('login-error').classList.remove('hidden'); }
}

function logout() {
  authToken = '';
  localStorage.removeItem('crous_auth_token');
  location.reload();
}

// ── PWA ──────────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-btn').classList.remove('hidden');
});

function installPWA() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
  }
}

function buildNav() {
  const container = document.getElementById('nav-items');
  container.innerHTML = NAV.map(item => `
    <button onclick="navigate('${item.id}')" class="nav-btn w-full flex items-center gap-3 px-3 py-2.5 text-sm border ${currentSection === item.id ? 'active' : 'text-zinc-500 border-transparent'}">
      <span class="${currentSection === item.id ? 'text-emerald-400' : 'text-zinc-600'}">${item.icon}</span>
      <span class="font-mono text-xs uppercase tracking-wider">${item.label}</span>
      ${currentSection === item.id ? '<span class="ml-auto w-1.5 h-1.5 rounded-full bg-emerald-400"></span>' : ''}
    </button>
  `).join('');
}

function navigate(section) {
  currentSection = section;
  document.getElementById('header-label').textContent = NAV.find(n => n.id === section)?.label || '';
  buildNav();
  renderSection();
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('sidebar-overlay').classList.add('hidden');
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('-translate-x-full');
  ov.classList.toggle('hidden');
}

// ── NOTIFICATION ────────────────────────────────────────────
function notify(msg, type = 'success') {
  const el = document.getElementById('notification');
  const colors = type === 'success' ? 'bg-emerald-500/10 border-emerald-500/40 text-emerald-400' : 'bg-red-500/10 border-red-500/40 text-red-400';
  const icon = type === 'success' ? '✓' : '✕';
  el.className = `fixed top-4 right-4 z-50 px-4 py-3 border text-sm font-mono flex items-center gap-2 ${colors}`;
  el.innerHTML = `${icon} ${msg}`;
  el.classList.remove('hidden');
  setTimeout(() => el.classList.add('hidden'), 3000);
}

// ── FETCH HELPERS ───────────────────────────────────────────
async function apiGet(path) {
  const headers = {};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const r = await fetch(API + path, { headers });
  if (r.status === 401) { location.reload(); return; }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiPost(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const r = await fetch(API + path, { method: 'POST', headers, body: JSON.stringify(body) });
  if (r.status === 401) { location.reload(); return; }
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.detail || 'Erreur'); }
  return r.json();
}
async function apiPut(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const r = await fetch(API + path, { method: 'PUT', headers, body: JSON.stringify(body) });
  if (r.status === 401) { location.reload(); return; }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiDelete(path) {
  const headers = {};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const r = await fetch(API + path, { method: 'DELETE', headers });
  if (r.status === 401) { location.reload(); return; }
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function apiUpload(file) {
  const fd = new FormData();
  fd.append('file', file);
  const headers = {};
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const r = await fetch(API + '/upload', { method: 'POST', body: fd, headers });
  if (r.status === 401) { location.reload(); return; }
  if (!r.ok) throw new Error('Upload failed');
  return r.json();
}

// ── RENDER ROUTER ───────────────────────────────────────────
async function renderSection() {
  const el = document.getElementById('content');
  switch (currentSection) {
    case 'overview': await renderOverview(el); break;
    case 'autoreplies': await renderAutoReplies(el); break;
    case 'banned': await renderBannedWords(el); break;
    case 'commands': await renderCommands(el); break;
    case 'settings': await renderSettings(el); break;
    case 'generator': renderGeneratorGated(el); break;
    case 'recidivistes': await renderRecidivistes(el); break;
    case 'whitelist': await renderWhitelist(el); break;
    case 'scheduled': await renderScheduled(el); break;
    case 'backup': await renderBackup(el); break;
  }
}

function arToggleForm() {
  arShowForm = !arShowForm;
  if (!arShowForm) { arEditId = null; arForm = { trigger: '', response: '', type: 'exact', active: true, image_url: null, audio_url: null }; }
  renderAutoReplies(document.getElementById('content'));
}

async function arPreviewMedia(type) {
  const input = document.getElementById(type === 'image' ? 'ar-image' : 'ar-audio');
  const file = input.files[0];
  if (!file) return;
  try {
    const result = await apiUpload(file);
    if (type === 'image') arForm.image_url = result.url;
    else arForm.audio_url = result.url;
    notify(type === 'image' ? 'Image uploadée !' : 'Audio uploadé !');
    renderAutoReplies(document.getElementById('content'));
  } catch { notify('Erreur upload', 'error'); }
}

function arRemoveMedia(type) {
  if (type === 'image') arForm.image_url = null;
  else arForm.audio_url = null;
  renderAutoReplies(document.getElementById('content'));
}

async function arSubmit(e) {
  e.preventDefault();
  const form = { trigger: document.getElementById('ar-trigger').value, response: document.getElementById('ar-response').value, type: document.getElementById('ar-type').value, active: true, image_url: arForm.image_url || null, audio_url: arForm.audio_url || null };
  try {
    if (arEditId) { await apiPut(`/auto-replies/${arEditId}`, form); notify('Auto-réponse modifiée !'); }
    else { await apiPost('/auto-replies', form); notify('Auto-réponse ajoutée !'); }
    arShowForm = false; arEditId = null; arForm = { trigger: '', response: '', type: 'exact', active: true, image_url: null, audio_url: null };
    renderAutoReplies(document.getElementById('content'));
  } catch { notify('Erreur', 'error'); }
}

async function arToggle(id, active) {
  await apiPut(`/auto-replies/${id}`, { active: !active });
  renderAutoReplies(document.getElementById('content'));
}

function arEdit(id) {
  const r = arData.find(x => x.id === id);
  if (!r) return;
  arForm = { trigger: r.trigger, response: r.response, type: r.type, active: r.active, image_url: r.image_url || null, audio_url: r.audio_url || null };
  arEditId = id; arShowForm = true;
  renderAutoReplies(document.getElementById('content'));
}

async function arDel(id) {
  if (!confirm('Supprimer cette auto-réponse ?')) return;
  await apiDelete(`/auto-replies/${id}`);
  notify('Supprimée !');
  renderAutoReplies(document.getElementById('content'));
}

function cmdToggleForm() {
  cmdShowForm = !cmdShowForm;
  if (!cmdShowForm) { cmdEditId = null; cmdForm = { command: '', description: '', category: 'Fun', emoji: '🤖', active: true, image_url: null, audio_url: null }; }
  renderCommands(document.getElementById('content'));
}

async function cmdPreviewMedia(type) {
  const input = document.getElementById(type === 'image' ? 'cmd-image' : 'cmd-audio');
  const file = input.files[0];
  if (!file) return;
  try {
    const result = await apiUpload(file);
    if (type === 'image') cmdForm.image_url = result.url;
    else cmdForm.audio_url = result.url;
    notify(type === 'image' ? 'Image uploadée !' : 'Audio uploadé !');
    renderCommands(document.getElementById('content'));
  } catch { notify('Erreur upload', 'error'); }
}

function cmdRemoveMedia(type) {
  if (type === 'image') cmdForm.image_url = null;
  else cmdForm.audio_url = null;
  renderCommands(document.getElementById('content'));
}

async function cmdSubmit(e) {
  e.preventDefault();
  const form = {
    command: document.getElementById('cmd-name').value,
    description: document.getElementById('cmd-desc').value,
    category: document.getElementById('cmd-cat').value,
    emoji: document.getElementById('cmd-emoji').value || '🤖',
    active: true,
    image_url: cmdForm.image_url || null,
    audio_url: cmdForm.audio_url || null
  };
  try {
    if (cmdEditId) { await apiPut(`/commands/${cmdEditId}`, form); notify('Commande modifiée !'); }
    else { await apiPost('/commands', form); notify('Commande ajoutée !'); }
    cmdShowForm = false; cmdEditId = null; cmdForm = { command: '', description: '', category: 'Fun', emoji: '🤖', active: true, image_url: null, audio_url: null };
    renderCommands(document.getElementById('content'));
  } catch { notify('Erreur', 'error'); }
}

async function cmdToggle(id, active) {
  await apiPut(`/commands/${id}`, { active: !active });
  renderCommands(document.getElementById('content'));
}

function cmdEdit(id) {
  const c = cmdData.find(x => x.id === id);
  if (!c) return;
  cmdForm = { command: c.command, description: c.description, category: c.category, emoji: c.emoji, active: c.active, image_url: c.image_url || null, audio_url: c.audio_url || null };
  cmdEditId = id; cmdShowForm = true;
  renderCommands(document.getElementById('content'));
}

async function cmdDel(id) {
  if (!confirm('Supprimer cette commande ?')) return;
  await apiDelete(`/commands/${id}`);
  notify('Supprimée !');
  renderCommands(document.getElementById('content'));
}

async function checkGenPassword(e) {
  e.preventDefault();
  const pw = document.getElementById('gen-password').value;
  try {
    const r = await fetch(API + '/login', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({password: pw}) });
    const data = await r.json();
    if (data.ok) {
      genUnlocked = true;
      authToken = data.token;
      localStorage.setItem('crous_auth_token', authToken);
      document.getElementById('logout-btn').classList.remove('hidden');
      renderGenerator(document.getElementById('content'));
    } else {
      document.getElementById('gen-pw-error').classList.remove('hidden');
    }
  } catch { document.getElementById('gen-pw-error').classList.remove('hidden'); }
}

function updateRestoreLabel(input) {
  const label = document.getElementById('restore-label');

    label.textContent = input.files[0].name;
  }
}

async function downloadBackup() {
  try {
    const data = await apiGet('/backup');
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'crous-bot-backup-' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
    notify('Backup téléchargé !');
  } catch { notify('Erreur lors de l\'export', 'error'); }
}

async function restoreBackup() {
  const input = document.getElementById('restore-file');
  const file = input.files[0];
  if (!file) { notify('Sélectionnez un fichier d\'abord', 'error'); return; }
  const text = await file.text();
  let data;
  try { data = JSON.parse(text); } catch { notify('Fichier JSON invalide', 'error'); return; }
  if (!confirm('Restaurer cette sauvegarde ? Les données actuelles seront remplacées.')) return;
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
    const r = await fetch(API + '/restore', { method: 'POST', headers, body: JSON.stringify(data) });
    const result = await r.json();
    notify('Restauration terminée : ' + (result.restored || []).join(', '));
    renderBackup(document.getElementById('content'));
  } catch { notify('Erreur lors de la restauration', 'error'); }
}

        </div>

        <div class="flex gap-3">
          <button type="submit" class="px-4 py-2 bg-amber-500 text-black font-bold text-sm hover:bg-amber-400 transition-colors flex items-center gap-2">
            ✓ ${schedEditId ? 'Modifier' : 'Programmer'}
          </button>
          <button type="button" onclick="schedToggleForm()" class="px-4 py-2 border border-white/10 text-white text-sm hover:border-white/30 transition-colors">Annuler</button>
        </div>
      </form>` : ''}

      <div class="space-y-3">
        ${schedData.length === 0 ? `
          <div class="flex flex-col items-center justify-center py-16 border border-white/5 bg-[#0B0B10]">
            <div class="text-4xl mb-4">🕐</div>
            <p class="text-zinc-500 font-mono text-sm">Aucun message programmé</p>
            <p class="text-zinc-700 font-mono text-xs mt-1">Créez votre premier message avec "+ Nouveau"</p>
          </div>
        ` : schedData.map(msg => `
          <div class="p-4 border ${msg.active ? 'border-amber-500/20 bg-amber-500/3' : 'border-white/5 bg-[#030305] opacity-50'} space-y-3">
            <div class="flex items-start gap-3">
              <div class="shrink-0 mt-0.5 w-16 h-10 border ${msg.active ? 'border-amber-500/30 bg-amber-500/10' : 'border-white/10'} flex items-center justify-center">
                <span class="font-mono font-bold text-sm ${msg.active ? 'text-amber-400' : 'text-zinc-500'}">${esc(msg.cron_time || '—')}</span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-white text-sm leading-relaxed line-clamp-2">${esc(msg.message || '')}</p>
                <div class="flex flex-wrap gap-1 mt-2">
                  ${(msg.days || []).map(d => `<span class="font-mono text-xs px-1.5 py-0.5 border border-amber-500/20 bg-amber-500/5 text-amber-400">${DAY_LABELS[d] || d}</span>`).join('')}
                </div>
                ${msg.target_group ? `<div class="font-mono text-xs text-zinc-600 mt-1">→ ${esc(msg.target_group)}</div>` : ''}
              </div>
              <div class="flex items-center gap-2 shrink-0">
                ${msg.image_url ? `<button onclick="showMediaModal('image','${msg.image_url}')" class="font-mono text-xs px-1.5 py-0.5 border border-cyan-500/20 bg-cyan-500/5 text-cyan-400">📷</button>` : ''}
                <button onclick="schedToggle('${msg.id}',${msg.active})" class="text-sm transition-colors ${msg.active ? 'text-amber-400 hover:text-amber-300' : 'text-zinc-600 hover:text-zinc-400'}" title="Activer/Désactiver">
                  ${msg.active ? '◉' : '◎'}
                </button>
                <button onclick="schedEdit('${msg.id}')" class="text-zinc-500 hover:text-white transition-colors p-1" title="Modifier">✎</button>
                <button onclick="schedDel('${msg.id}')" class="text-zinc-500 hover:text-red-400 transition-colors p-1" title="Supprimer">✕</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function schedToggleDay(day) {
  const idx = schedForm.days.indexOf(day);
  if (idx > -1) schedForm.days.splice(idx, 1);
  else schedForm.days.push(day);
  // Update button visuals without full re-render
  const btn = document.getElementById('day-btn-' + day);
  if (btn) {
    if (schedForm.days.includes(day)) btn.classList.add('active');
    else btn.classList.remove('active');
  }
}

function schedToggleForm() {
  schedShowForm = !schedShowForm;
  if (!schedShowForm) {
    schedEditId = null;
    schedForm = { message: '', cron_time: '08:00', days: ['lun','mar','mer','jeu','ven'], target_group: '', active: true, image_url: null };
  }
  renderScheduled(document.getElementById('content'));
}

async function schedPreviewImage() {
  const input = document.getElementById('sched-image');
  const file = input.files[0];
  if (!file) return;
  try {
    const result = await apiUpload(file);
    schedForm.image_url = result.url;
    notify('Image uploadée !');
    renderScheduled(document.getElementById('content'));
  } catch { notify('Erreur upload', 'error'); }
}

function schedRemoveImage() {
  schedForm.image_url = null;
  renderScheduled(document.getElementById('content'));
}

async function schedSubmit(e) {
  e.preventDefault();
  const form = {
    message: document.getElementById('sched-message').value,
    cron_time: document.getElementById('sched-time').value,
    days: [...schedForm.days],
    target_group: document.getElementById('sched-group').value,
    active: true,
    image_url: schedForm.image_url || null
  };
  try {
    if (schedEditId) { await apiPut(`/scheduled/${schedEditId}`, form); notify('Message modifié !'); }
    else { await apiPost('/scheduled', form); notify('Message programmé !'); }
    schedShowForm = false; schedEditId = null;
    schedForm = { message: '', cron_time: '08:00', days: ['lun','mar','mer','jeu','ven'], target_group: '', active: true, image_url: null };
    renderScheduled(document.getElementById('content'));
  } catch { notify('Erreur', 'error'); }
}

async function schedToggle(id, active) {
  await apiPut(`/scheduled/${id}`, { active: !active });
  renderScheduled(document.getElementById('content'));
}

function schedEdit(id) {
  const msg = schedData.find(x => x.id === id);
  if (!msg) return;
  schedForm = {
    message: msg.message || '',
    cron_time: msg.cron_time || '08:00',
    days: [...(msg.days || [])],
    target_group: msg.target_group || '',
    active: msg.active,
    image_url: msg.image_url || null
  };
  schedEditId = id; schedShowForm = true;
  renderScheduled(document.getElementById('content'));
}

async function schedDel(id) {
  if (!confirm('Supprimer ce message programmé ?')) return;
  await apiDelete(`/scheduled/${id}`);
  notify('Supprimé !');
  renderScheduled(document.getElementById('content'));
}

// ── MEDIA MODAL ──────────────────────────────────────────────
function showMediaModal(type, url) {
  const modal = document.getElementById('media-modal');
  const content = document.getElementById('media-modal-content');
  if (type === 'image') {
    content.innerHTML = '<img src="' + API_BASE + url + '" class="max-w-full max-h-[70vh] object-contain">';
  } else {
    content.innerHTML = '<audio controls autoplay src="' + API_BASE + url + '" class="w-96"></audio>';
  }
  modal.classList.remove('hidden');
}

function closeMediaModal() {
  document.getElementById('media-modal').classList.add('hidden');
  document.getElementById('media-modal-content').innerHTML = '';
}

// ── UTILS ───────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── INIT ────────────────────────────────────────────────────
(async () => {
  const authed = await checkAuth();
  if (!authed) {
    document.getElementById('login-overlay').classList.remove('hidden');
    return;
  }
  if (authRequired && authToken) {
    document.getElementById('logout-btn').classList.remove('hidden');
  }
  buildNav();
  navigate('overview');
})();
</script>
</body>
